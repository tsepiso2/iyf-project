import { useState, useEffect } from 'react';
import { useNavigate } from 'react-router-dom';
import { useAuth } from '@/context/AuthContext';
import { LogOut, FileText, Award, MessageCircle, Plus, Download, Link as LinkIcon } from 'lucide-react';
import { useToast } from '@/components/ui/use-toast';

interface Submission {
  id: string;
  studentName: string;
  studentEmail: string;
  files: Array<{ name: string; type: string }>;
  links?: Array<{ url: string; title: string }>;
  submittedAt: string;
  marks?: number;
  feedback?: string;
}

export default function StudentSubmissions() {
  const [submissions, setSubmissions] = useState<Submission[]>([]);
  const [selectedSubmission, setSelectedSubmission] = useState<Submission | null>(null);
  const { user, logout } = useAuth();
  const navigate = useNavigate();
  const { toast } = useToast();

  useEffect(() => {
    if (!user || user.role !== 'student') {
      navigate('/');
    }
  }, [user, navigate]);

  useEffect(() => {
    const stored = localStorage.getItem('submissions');
    if (stored) {
      const allSubs = JSON.parse(stored);
      const userSubs = allSubs.filter((sub: Submission) => sub.studentEmail === user.email);
      setSubmissions(userSubs);
      if (userSubs.length > 0) {
        setSelectedSubmission(userSubs[0]);
      }
    }
  }, [user.email]);

  const handleLogout = () => {
    logout();
    toast({ description: 'Logged out successfully' });
    navigate('/');
  };

  const downloadFeedback = () => {
    if (!selectedSubmission || selectedSubmission.marks === undefined) {
      toast({ title: 'Error', description: 'No feedback available to download', variant: 'destructive' });
      return;
    }

    const feedbackContent = `
ASSIGNMENT FEEDBACK REPORT
==========================

Student: ${selectedSubmission.studentName}
Email: ${selectedSubmission.studentEmail}
Submitted: ${new Date(selectedSubmission.submittedAt).toLocaleString()}

GRADE: ${getGrade(selectedSubmission.marks)}/100 (${selectedSubmission.marks}%)

FEEDBACK:
${selectedSubmission.feedback || 'No additional feedback provided.'}

==========================
Generated: ${new Date().toLocaleString()}
    `.trim();

    const element = document.createElement('a');
    element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(feedbackContent));
    element.setAttribute('download', `feedback-${selectedSubmission.studentName}-${Date.now()}.txt`);
    element.style.display = 'none';
    document.body.appendChild(element);
    element.click();
    document.body.removeChild(element);

    toast({ title: 'Downloaded!', description: 'Feedback report downloaded successfully' });
  };

  const getGrade = (marks?: number) => {
    if (!marks) return '-';
    if (marks >= 90) return 'A';
    if (marks >= 80) return 'B';
    if (marks >= 70) return 'C';
    if (marks >= 60) return 'D';
    return 'F';
  };

  const getGradeColor = (marks?: number) => {
    if (!marks) return 'text-gray-500';
    if (marks >= 90) return 'text-green-600';
    if (marks >= 80) return 'text-blue-600';
    if (marks >= 70) return 'text-yellow-600';
    if (marks >= 60) return 'text-orange-600';
    return 'text-red-600';
  };

  return (
    <div className="min-h-screen bg-gradient-to-br from-white to-gray-50">
      {/* Header */}
      <div className="bg-gradient-green shadow-sm">
        <div className="max-w-7xl mx-auto px-4 py-6 md:py-8 flex items-center justify-between">
          <div>
            <h1 className="text-3xl font-bold text-white">My Assignments</h1>
            <p className="text-white/80 text-sm mt-1">Student: {user.username}</p>
          </div>
          <button
            onClick={handleLogout}
            className="flex items-center gap-2 bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded-lg transition-colors duration-200"
          >
            <LogOut className="w-4 h-4" />
            <span className="text-sm font-medium">Logout</span>
          </button>
        </div>
      </div>

      {/* Main Content */}
      <div className="max-w-7xl mx-auto px-4 py-12">
        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
          {/* Submissions List */}
          <div className="lg:col-span-1">
            <div className="bg-white rounded-2xl shadow-xl overflow-hidden">
              <div className="bg-gradient-to-r from-green-50 to-emerald-50 p-4 border-b border-gray-200 flex items-center justify-between">
                <h3 className="font-semibold text-gray-900">
                  {submissions.length} Submission{submissions.length !== 1 ? 's' : ''}
                </h3>
                <button
                onClick={() => {
                  navigate('/submit-files');
                  toast({ description: 'Navigate to submission page' });
                }}
                className="flex items-center gap-1 bg-primary text-white px-3 py-1 rounded-lg text-sm hover:bg-primary/90 transition-colors"
              >
                <Plus className="w-4 h-4" />
                New
              </button>
              </div>

              {submissions.length === 0 ? (
                <div className="p-8 text-center">
                  <FileText className="w-12 h-12 text-gray-300 mx-auto mb-3" />
                  <p className="text-gray-600 text-sm mb-4">No submissions yet</p>
                  <button
                    onClick={() => navigate('/submit-files')}
                    className="w-full flex items-center justify-center gap-2 bg-gradient-green text-white px-4 py-2 rounded-lg hover:shadow-lg transition-all"
                  >
                    <Plus className="w-4 h-4" />
                    Submit Assignment
                  </button>
                </div>
              ) : (
                <div className="divide-y max-h-96 overflow-y-auto">
                  {submissions.map((submission) => (
                    <button
                      key={submission.id}
                      onClick={() => setSelectedSubmission(submission)}
                      className={`w-full p-4 text-left hover:bg-gray-50 transition-colors ${
                        selectedSubmission?.id === submission.id ? 'bg-green-50 border-l-4 border-primary' : ''
                      }`}
                    >
                      <div className="flex items-start justify-between">
                        <div className="flex-1">
                          <p className="text-xs text-gray-500 mb-1">
                            {new Date(submission.submittedAt).toLocaleDateString()}
                          </p>
                          <p className="text-sm font-medium text-gray-900">
                            {submission.files.length} file{submission.files.length !== 1 ? 's' : ''}
                            {submission.links && submission.links.length > 0 && (
                              <span>, {submission.links.length} link{submission.links.length !== 1 ? 's' : ''}</span>
                            )}
                          </p>
                        </div>
                        {submission.marks !== undefined && (
                          <div className="text-right">
                            <p className={`text-lg font-bold ${getGradeColor(submission.marks)}`}>
                              {getGrade(submission.marks)}
                            </p>
                            <p className="text-xs text-gray-600">{submission.marks}%</p>
                          </div>
                        )}
                      </div>
                    </button>
                  ))}
                </div>
              )}
            </div>
          </div>

          {/* Submission Details & Marks */}
          {selectedSubmission && (
            <div className="lg:col-span-2 space-y-6">
              {/* Submission Info */}
              <div className="bg-white rounded-2xl shadow-xl p-8">
                <h3 className="text-xl font-semibold text-gray-900 mb-4">Submission Details</h3>
                <div className="space-y-3">
                  <div>
                    <p className="text-sm text-gray-600">Submitted Date</p>
                    <p className="text-gray-900">
                      {new Date(selectedSubmission.submittedAt).toLocaleString()}
                    </p>
                  </div>
                  <div className="space-y-4">
                    {selectedSubmission.files && selectedSubmission.files.length > 0 && (
                      <div>
                        <p className="text-sm text-gray-600">Files ({selectedSubmission.files.length})</p>
                        <div className="mt-2 space-y-2">
                          {selectedSubmission.files.map((file, idx) => (
                            <div key={idx} className="flex items-center gap-3 p-3 bg-gray-50 rounded-lg">
                              <FileText className="w-4 h-4 text-primary flex-shrink-0" />
                              <div className="flex-1 min-w-0">
                                <p className="text-sm font-medium text-gray-900 truncate">{file.name}</p>
                                <p className="text-xs text-gray-600">{file.type}</p>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}

                    {selectedSubmission.links && selectedSubmission.links.length > 0 && (
                      <div>
                        <p className="text-sm text-gray-600">Links ({selectedSubmission.links.length})</p>
                        <div className="mt-2 space-y-2">
                          {selectedSubmission.links.map((link, idx) => (
                            <a
                              key={idx}
                              href={link.url}
                              target="_blank"
                              rel="noopener noreferrer"
                              className="flex items-center gap-3 p-3 bg-blue-50 rounded-lg hover:bg-blue-100 transition-colors border border-blue-200"
                            >
                              <LinkIcon className="w-4 h-4 text-blue-600 flex-shrink-0" />
                              <div className="flex-1 min-w-0">
                                <p className="text-sm font-medium text-gray-900">{link.title}</p>
                                <p className="text-xs text-blue-600 truncate">{link.url}</p>
                              </div>
                            </a>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              </div>

              {/* Marks & Feedback */}
              {selectedSubmission.marks !== undefined ? (
                <div className="bg-white rounded-2xl shadow-xl p-8">
                  <div className="flex items-center justify-between mb-6">
                    <h3 className="text-xl font-semibold text-gray-900">Grade & Feedback</h3>
                    <button
                      onClick={downloadFeedback}
                      className="flex items-center gap-2 bg-primary text-white px-4 py-2 rounded-lg hover:bg-primary/90 transition-colors text-sm font-medium"
                    >
                      <Download className="w-4 h-4" />
                      Download Feedback
                    </button>
                  </div>

                  {/* Grade Display */}
                  <div className="mb-6 p-6 bg-gradient-to-br from-green-50 to-emerald-50 rounded-xl border border-green-200">
                    <div className="grid grid-cols-2 gap-6">
                      <div>
                        <p className="text-sm text-gray-600 mb-2">Your Grade</p>
                        <div className="flex items-baseline gap-2">
                          <span className={`text-5xl font-bold ${getGradeColor(selectedSubmission.marks)}`}>
                            {getGrade(selectedSubmission.marks)}
                          </span>
                          <span className="text-2xl font-semibold text-gray-600">
                            {selectedSubmission.marks}/100
                          </span>
                        </div>
                      </div>
                      <div>
                        <p className="text-sm text-gray-600 mb-2">Grade Scale</p>
                        <div className="space-y-1 text-sm">
                          <p>90-100: <span className="font-semibold text-green-600">A</span></p>
                          <p>80-89: <span className="font-semibold text-blue-600">B</span></p>
                          <p>70-79: <span className="font-semibold text-yellow-600">C</span></p>
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* Feedback */}
                  {selectedSubmission.feedback && (
                    <div>
                      <div className="flex items-center gap-2 mb-3">
                        <MessageCircle className="w-5 h-5 text-primary" />
                        <h4 className="font-semibold text-gray-900">Instructor Feedback</h4>
                      </div>
                      <div className="p-4 bg-blue-50 border border-blue-200 rounded-lg">
                        <p className="text-gray-800 whitespace-pre-wrap">
                          {selectedSubmission.feedback}
                        </p>
                      </div>
                    </div>
                  )}
                </div>
              ) : (
                <div className="bg-white rounded-2xl shadow-xl p-8 text-center">
                  <Award className="w-16 h-16 text-gray-300 mx-auto mb-4" />
                  <h3 className="text-lg font-semibold text-gray-700 mb-2">Awaiting Grade</h3>
                  <p className="text-gray-600">
                    Your instructor will review and grade your submission soon.
                  </p>
                </div>
              )}
            </div>
          )}

          {/* No Selection */}
          {!selectedSubmission && submissions.length > 0 && (
            <div className="lg:col-span-2">
              <div className="bg-white rounded-2xl shadow-xl p-12 text-center">
                <FileText className="w-16 h-16 text-gray-300 mx-auto mb-4" />
                <h3 className="text-lg font-semibold text-gray-700">Select a Submission</h3>
                <p className="text-gray-600 mt-2">
                  Choose a submission from the list to view your grade and feedback
                </p>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}
